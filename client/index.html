<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S MEET</title>
    <!-- MediaPipe Scripts for Production Stability -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- iPhone Crash Debugger -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var errDiv = document.createElement('div');
        errDiv.style = "position:fixed; top:0; left:0; width:100%; z-index:99999; background:red; color:white; padding:20px; font-size:16px; word-wrap:break-word;";
        errDiv.innerText = "Fatal Error: " + msg + " at " + line + ":" + col;
        document.body.prepend(errDiv);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style = "position:fixed; top:0; left:0; width:100%; z-index:99999; background:darkred; color:white; padding:20px; font-size:16px; word-wrap:break-word;";
        errDiv.innerText = "Promise Error: " + (event.reason ? (event.reason.message || event.reason) : 'Unknown');
        document.body.prepend(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
